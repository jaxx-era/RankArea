<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Info</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Business Information</h2>
<form id="businessForm">
  <input type="text" name="name" placeholder="Business Name" required>
  <input type="text" name="city" placeholder="City" required>
  <input type="text" name="category" placeholder="Category" required>
  <input type="number" name="years" placeholder="Years in Business">
  <input type="number" name="reviews" placeholder="No. of Reviews">
  <button type="submit">Submit & Proceed to Payment</button>
</form>
<script src="script.js"></script>
</body>
</html>
